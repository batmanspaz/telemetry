name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - name: Enable corepack (pnpm)
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
      - name: Test
        run: pnpm test
      - name: Verify dist/ is committed and up to date
        # dist/ is checked in (not gitignored) so tarball/git-URL installs — which
        # don't run the `prepare` lifecycle script — always get built output.
        # Fails loud if src/ changed without rebuilding dist/, instead of silently
        # shipping stale output to every consumer.
        run: |
          pnpm run build
          git diff --exit-code -- dist/
